<div class="comentario container-fluid position-relative py-3 px-4 border-top border-dark transition-comentario">
  <section class="comentar d-flex flex-wrap align-items-center pb-5">
    
    <div class="titulo w-100 fw-bold fs-5 mb-2 text-truncate">
      {{ data?.Titulo || 'Sin título' }}
    </div>

    <div class="rating-stars text-dark small me-3 mb-1">
      @for (star of [1,2,3,4,5]; track star) {
        <i class="bi" 
           [class.bi-star-fill]="star <= obtenerRating()" 
           [class.bi-star]="star > obtenerRating()"></i>
      }
      <span class="ms-1 fw-bold">({{ obtenerRating() }}.0)</span>
    </div>

    <div class="fecha text-muted small mb-1">
      {{ data?.Fecha || 'Fecha desconocida' }}
    </div>

    <p class="texto w-100 mt-3 mb-4 lh-base">
      {{ data?.Texto }}
    </p>
    
    <div class="acciones-comentario position-absolute bottom-0 end-0 p-3 d-flex align-items-center gap-3">
          
      <button class="btn btn-link p-0 btn-interaction" 
              [ngClass]="isLoggedIn ? 'btn-active' : 'btn-disabled'"
              [class.selected-like]="liked"
              (click)="onLike()" 
              title="Útil">
        <i class="bi" [ngClass]="liked ? 'bi-hand-thumbs-up-fill' : 'bi-hand-thumbs-up'"></i>
      </button>

      <button class="btn btn-link p-0 btn-interaction" 
              [ngClass]="isLoggedIn ? 'btn-active' : 'btn-disabled'"
              [class.selected-dislike]="disliked"
              (click)="onDislike()" 
              title="No útil">
        <i class="bi" [ngClass]="disliked ? 'bi-hand-thumbs-down-fill' : 'bi-hand-thumbs-down'"></i>
      </button>

      <button class="btn btn-link p-0 btn-interaction" 
              [ngClass]="isLoggedIn ? 'btn-active' : 'btn-disabled'"
              title="Más opciones">
        <i class="bi bi-three-dots"></i>
      </button>
      
    </div>

  </section>
</div>
