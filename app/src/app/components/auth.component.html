<div class="auth-container">
  <h2>{{ isLogin ? 'Iniciar Sesión' : 'Registrarse' }}</h2>
  <form [formGroup]="authForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="email">Email:</label>
      <input type="email" id="email" formControlName="email">
      <div *ngIf="authForm.get('email')?.invalid && authForm.get('email')?.touched" class="error">
        Email inválido
      </div>
    </div>
    <div class="form-group">
      <label for="password">Contraseña:</label>
      <input type="password" id="password" formControlName="password">
      <div *ngIf="authForm.get('password')?.invalid && authForm.get('password')?.touched" class="error">
        Contraseña requerida (mín 6 caracteres)
      </div>
    </div>
    <div class="form-group" *ngIf="!isLogin">
      <label for="confirmPassword">Confirmar Contraseña:</label>
      <input type="password" id="confirmPassword" formControlName="confirmPassword">
      <div *ngIf="authForm.get('confirmPassword')?.invalid && authForm.get('confirmPassword')?.touched" class="error">
        Confirmación requerida
      </div>
    </div>
    <button type="submit" [disabled]="authForm.invalid">{{ isLogin ? 'Iniciar Sesión' : 'Registrarse' }}</button>
  </form>
  <button (click)="toggleMode()">{{ isLogin ? '¿No tienes cuenta? Regístrate' : '¿Ya tienes cuenta? Inicia Sesión' }}</button>
</div>
