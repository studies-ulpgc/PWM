<app-header-grande></app-header-grande>

<main class="home">
  <article class="scroll-vertical">

    <section class="carrucel">
      <div class="animation-container">
        <a
          *ngFor="let item of carruselItems; trackBy: trackById"
          [routerLink]="['/articulo', item.id]"
          class="foto"
          [style.backgroundImage]="'url(' + item.fotoUrl + ')'">
        </a>
      </div>
    </section>

    <section class="galeria">
      <app-producto *ngFor="let prod of productos; trackBy: trackById" [data]="prod"></app-producto>
    </section>

    <app-footer></app-footer>
  </article>
</main>
