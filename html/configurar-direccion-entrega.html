<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Configurar Direcci처n Entrega</title>
    <link rel="stylesheet" href="../css/general.css" />
    <link rel="stylesheet" href="../css/styleguide.css" />
    <script src="../js/carga-datos/imagen_izq.js"></script>
</head>
<body>
    <div class="pagina-split">
        <div class="contenedor-foto">
            <img id="foto-json" alt="Registro" class="foto-fondo">
        </div>

        <div class="seccion-formulario">
            <main class="contacto-principal">
                <form class="formulario-contenedor" action="pagar.html" novalidate>
                    
                    <div class="campo-grupo">
                        <label for="calle" class="etiqueta-formulario">Calle</label>
                        <input type="text" id="calle" name="calle" class="entrada-texto" 
                                placeholder="Nombre de la calle - N첬mero" 
                               pattern="^[a-zA-Z횁횋횒횙횣찼챕챠처첬챰횗\s]+ - [0-9]+$" 
                               required>
                        <span class="error-mensaje">Formato requerido: Nombre de la calle - N첬mero</span>
                    </div>

                    <div class="campo-grupo">
                        <label for="cp" class="etiqueta-formulario">C처digo postal</label>
                        <input type="text" id="cp" name="cp" class="entrada-texto" 
                               placeholder="5 d챠gitos" 
                               pattern="[0-9]{5}" 
                               required>
                        <span class="error-mensaje">Deben ser exactamente 5 n첬meros</span>
                    </div>

                    <div class="campo-grupo">
                        <label for="provincia" class="etiqueta-formulario">Estado/Provincia</label>
                        <input type="text" id="provincia" name="provincia" class="entrada-texto" 
                               placeholder="Estado o provincia" 
                               pattern="[a-zA-Z횁횋횒횙횣찼챕챠처첬챰횗 ]+" 
                               required>
                        <span class="error-mensaje">Solo se permiten letras</span>
                    </div>

                    <div class="fila-doble">
                        <div class="campo-grupo">
                            <label for="nombre" class="etiqueta-formulario">Nombre</label>
                            <input type="text" id="nombre" name="nombre" class="entrada-texto" 
                                    placeholder="Tu nombre" 
                                    pattern="[a-zA-Z횁횋횒횙횣찼챕챠처첬챰횗 ]+" 
                                    required>
                            <span class="error-mensaje">Solo letras</span>
                        </div>
                        <div class="campo-grupo">
                            <label for="apellido" class="etiqueta-formulario">Apellido</label>
                            <input type="text" id="apellido" name="apellido" class="entrada-texto" 
                                    placeholder="Tu apellido" 
                                    pattern="[a-zA-Z횁횋횒횙횣찼챕챠처첬챰횗 ]+" 
                                    required>
                            <span class="error-mensaje">Solo letras</span>
                        </div>
                    </div>

                    <div class="campo-grupo">
                        <label for="fecha" class="etiqueta-formulario">Fecha de nacimiento</label>
                        <input type="date" id="fecha" name="fecha" class="entrada-texto" required>
                        <span class="error-mensaje">La fecha es obligatoria</span>
                    </div>

                    <div class="campo-grupo">
                        <label for="email" class="etiqueta-formulario">Email</label>
                        <input type="email" id="email" name="email" class="entrada-texto"
                                pattern="^[^@]+@[^@]+\.[a-zA-Z]{2,}$"
                                placeholder="ejemplo@correo.com"
                                required>
                        <span class="error-mensaje">Introduce un email v찼lido</span>
                    </div>

                    <button type="submit" class="boton-negro">Guardar</button>
                </form>
            </main>
        </div>
    </div>
</body>
</html>
