<!DOCTYPE html>
<html lang="es">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta charset="utf-8" />
        <title>Galería</title>
        <link rel="stylesheet" href="../css/globals.css" />
        <link rel="stylesheet" href="../css/styleguide.css" />
        <link rel="stylesheet" href="../css/galeria.css" />
        <script src="../js/producto.js"></script>
        <script src="../js/main.js"></script>
        <script src="../js/header.js"></script>
        <script src="../js/footer.js"></script>
    </head>

    <body>
        <header id="header"></header>

        <main class="galeria">
            <article class="scroll-vertical">
                <section class="main">
                    <aside class="menu-filtro">
                        <div class="menu-contenido">

                            <div class="filtro-bloque">
                                <div class="titulo">Filtros</div>
                                <div class="tag-lista">
                                    <div class="tag">
                                        <img src="../img/x.svg" alt="x" />
                                        <span>Mujer</span>
                                    </div>
                                    <div class="tag">
                                        <img src="../img/x.svg" alt="x" />
                                        <span>Oferta</span>
                                    </div>
                                    <div class="tag">
                                        <img src="../img/x.svg" alt="x" />
                                        <span>Trending</span>
                                    </div>
                                </div>
                            </div>

                            <div class="filtro-bloque">
                                <div class="checkbox-group">
                                    <label class="checkbox-field">
                                        <input type="checkbox" class="checkbox-input" checked />
                                        <span>Primavera</span>
                                    </label>
                                    <label class="checkbox-field">
                                        <input type="checkbox" class="checkbox-input" checked />
                                        <span>Verano</span>
                                    </label>
                                    <label class="checkbox-field">
                                        <input type="checkbox" class="checkbox-input" checked />
                                        <span>Invierno</span>
                                    </label>
                                </div>
                            </div>

                            <div class="filtro-bloque">
                                <div class="slider-header">
                                    <span class="titulo">Precio</span>
                                    <div class="slider-output">
                                        <span>0-100</span>
                                        <span>€</span>
                                    </div>
                                </div>
                                <img class="slider-barra" src="../img/bloque.svg" alt="Barra de rango" />
                            </div>

                            <div class="filtro-bloque">
                                <div class="titulo">Material</div>
                                <div class="checkbox-grid">
                                    <label class="checkbox-field">
                                        <input type="checkbox" class="checkbox-input" checked />
                                        <span>Lana</span>
                                    </label>
                                    <label class="checkbox-field">
                                        <input type="checkbox" class="checkbox-input" checked />
                                        <span>Algodón</span>
                                    </label>
                                    <label class="checkbox-field">
                                        <input type="checkbox" class="checkbox-input" checked />
                                        <span>Cuero</span>
                                    </label>
                                    <label class="checkbox-field">
                                        <input type="checkbox" class="checkbox-input" checked />
                                        <span>Poliéster</span>
                                    </label>
                                    <label class="checkbox-field">
                                        <input type="checkbox" class="checkbox-input" checked />
                                        <span>Tela</span>
                                    </label>
                                    <label class="checkbox-field">
                                        <input type="checkbox" class="checkbox-input" checked />
                                        <span>Opaco</span>
                                    </label>
                                </div>
                            </div>

                            <div class="filtro-bloque">
                                <div class="titulo">Estilo</div>
                                <div class="checkbox-grid">
                                    <label class="checkbox-field">
                                        <input type="checkbox" class="checkbox-input" checked />
                                        <span>Casual</span>
                                    </label>
                                    <label class="checkbox-field">
                                        <input type="checkbox" class="checkbox-input" checked />
                                        <span>Elegante</span>
                                    </label>
                                    <label class="checkbox-field">
                                        <input type="checkbox" class="checkbox-input" checked />
                                        <span>Dulce</span>
                                    </label>
                                    <label class="checkbox-field">
                                        <input type="checkbox" class="checkbox-input" checked />
                                        <span>Vacaciones</span>
                                    </label>
                                    <label class="checkbox-field">
                                        <input type="checkbox" class="checkbox-input" checked />
                                        <span>Oficina</span>
                                    </label>
                                    <label class="checkbox-field">
                                        <input type="checkbox" class="checkbox-input" checked />
                                        <span>Cómodo</span>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </aside>
                    <section id="productos-contenedor" class="galeria-de-3"></section>
                </section>
                <footer id="footer"></footer>
            </article>
        </main>
    </body>
</html>
